    /api/v1/corrida/{id}/semana/{semana}/dia/{dia}/blocos:
        put:
            operationId: putCorridaByIdSemanaBySemanaDiaByDiaBlocos
            summary: Persiste blocos de um dia com validação e OCC por versao/If-Match
            tags: [Periodização Corrida]
            security:
                - BearerAuth: []
            parameters:
                - name: id
                  in: path
                  required: true
                  description: ID do plano
                  schema:
                    type: integer
                    example: 1
                - name: semana
                  in: path
                  required: true
                  description: Número da semana (1-based)
                  schema:
                    type: integer
                    example: 1
                - name: dia
                  in: path
                  required: true
                  description: Dia da semana (1=segunda ... 7=domingo)
                  schema:
                    type: integer
                    minimum: 1
                    maximum: 7
                    example: 2
                - name: If-Match
                  in: header
                  required: false
                  description: Versão esperada do plano (alternativa a versao no body)
                  schema:
                    type: string
                    example: exemplo
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [blocos]
                            properties:
                                versao:
                                    type: integer
                                    example: 1
                                nome:
                                    type: string
                                    example: Maria Silva
                                tipo:
                                    type: string
                                    example: corrida
                                zona:
                                    type: string
                                    example: Z2
                                blocos:
                                    type: array
                                    items:
                                        type: object
                                        example: {}
                                    example:
                                        - {}
                        example:
                            versao: 1
                            nome: Maria Silva
                            tipo: exemplo
                            zona: exemplo
                            blocos:
                                - nome: Aquecimento
                                  tipo: wup
                description: Corpo da requisição para `PUT /api/v1/corrida/{id}/semana/{semana}/dia/{dia}/blocos`.
            responses:
                '200':
                    description: Blocos salvos
                '400':
                    description: Validação de estrutura falhou
                '409':
                    description: Conflito de versão (OCC)
            description: Persiste blocos de um dia com validação e OCC por versao/If-Match (`PUT /api/v1/corrida/{id}/semana/{semana}/dia/{dia}/blocos`).
