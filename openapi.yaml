openapi: 3.0.0
info:
    title: STAFF App API
    description: Frontend-agnostic Go REST API for student management, anamnese intake, training sheets, running periodization, Garmin activity processing, SVED metrics, local RAG and administrative reporting.
    version: 0.1.0-rc
servers:
    - url: http://localhost:5000
      description: Local development server
tags:
    - name: Health
      description: Health checks, readiness and liveness endpoints.
    - name: Auth
      description: Authentication, current user and password operations.
    - name: Planos
      description: Public subscription plan listing.
    - name: Pré-Cadastro
      description: Public student pre-registration flows.
    - name: Anamnese
      description: Public anamnese token metadata and submission flows.
    - name: Fichas Web
      description: Public workout links, snapshots, feedback and access metadata.
    - name: Feedback
      description: Ficha feedback and notification operations.
    - name: Treinos Musculação
      description: Strength-training completion tracking endpoints.
    - name: Periodização Corrida
      description: Running periodization plans, public links and calendars.
    - name: Alunos
      description: Student management and student-level summaries.
    - name: VDOT Tests
      description: VDOT and 3 km test operations.
    - name: Fichas Musculação
      description: Strength workout creation, editing and deletion.
    - name: SVED
      description: SVED calculations, history, suggestions and dashboard endpoints.
    - name: Histórico
      description: Ficha history and detailed training history endpoints.
    - name: Admin Pré-Cadastro
      description: Administrative pre-registration approval and rejection flows.
    - name: Admin Anamnese
      description: Administrative anamnese review, approval, rejection and email flows.
    - name: Exercícios
      description: Exercise library, custom exercise and rehabilitation endpoints.
    - name: Sugestões Rehab IA
      description: AI/RAG rehabilitation exercise suggestion moderation.
    - name: Admin Gestão Usuários
      description: Administrative user approval, rejection and access control.
    - name: Admin Planos
      description: Administrative subscription plan management.
    - name: Admin Configurações
      description: Administrative system configuration and SMTP testing.
    - name: Admin Dashboard
      description: Administrative metrics and dashboard summaries.
    - name: Admin Relatórios
      description: Administrative specialized reports.
    - name: Admin RAG
      description: Administrative knowledge-base and RAG query endpoints.
    - name: Garmin
      description: Garmin upload, activity metadata and athlete statistics.
    - name: Garmin Gráficos
      description: Garmin chart and Plotly-compatible analytics endpoints.
paths:
    /:
        get:
            operationId: getRoot
            summary: Index endpoint com informação básica do servidor
            tags: [Health]
            responses:
                '200':
                    description: Servidor online
                    content:
                        text/html:
                            schema:
                                type: string
                                example: "<h1>STAFF App API</h1>"
            description: Index endpoint com informação básica do servidor (`GET /`).
    /health:
        get:
            operationId: getHealth
            summary: Health check completo com status do banco de dados
            tags: [Health]
            responses:
                '200':
                    description: Status de saúde consolidado
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                        example: ok
                                    database:
                                        type: string
                                        example: connected
                                example: {}
                            example:
                                status: exemplo
                                database: exemplo
            description: Health check completo com status do banco de dados (`GET /health`).
    /ping:
        get:
            operationId: getPing
            summary: Resposta simples pong para verificação rápida de liveness
            tags: [Health]
            responses:
                '200':
                    description: Pong response
                    content:
                        text/plain:
                            schema:
                                type: string
                                example: pong
            description: Resposta simples pong para verificação rápida de liveness (`GET /ping`).
    /api/v1/ping:
        get:
            operationId: getPing2
            summary: Health check sob namespace api/v1
            tags: [Health]
            responses:
                '200':
                    description: API e banco de dados operacionais
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                        example: ok
                                    database:
                                        type: string
                                        example: connected
                                example: {}
                            example:
                                status: exemplo
                                database: exemplo
            description: Health check sob namespace api/v1 (`GET /api/v1/ping`).
    /api/v1/auth/register:
        post:
            operationId: postAuthRegister
            summary: Registro de novo treinador
            tags: [Auth]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [username, password, name, email]
                            properties:
                                username:
                                    type: string
                                    example: treinador
                                password:
                                    type: string
                                    example: senha-segura
                                name:
                                    type: string
                                    example: exemplo
                                email:
                                    type: string
                                    example: aluno@example.com
                        example:
                            username: treinador
                            password: senha-segura
                            name: exemplo
                            email: aluno@example.com
                description: Corpo da requisição para `POST /api/v1/auth/register`.
            responses:
                '201':
                    description: Registro efetuado com sucesso (aguardando moderação do admin)
                '400':
                    description: Payload inválido ou usuário existente
            description: Registro de novo treinador (`POST /api/v1/auth/register`).
    /api/v1/auth/login:
        post:
            operationId: postAuthLogin
            summary: Login de treinador / admin
            tags: [Auth]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [username, password]
                            properties:
                                username:
                                    type: string
                                    example: treinador
                                password:
                                    type: string
                                    example: senha-segura
                        example:
                            username: treinador
                            password: senha-segura
                description: Corpo da requisição para `POST /api/v1/auth/login`.
            responses:
                '200':
                    description: Login bem-sucedido
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token:
                                        type: string
                                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                                example: {}
                            example:
                                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                '401':
                    description: Credenciais inválidas ou conta inativa
            description: Login de treinador / admin (`POST /api/v1/auth/login`).
    /api/v1/auth/me:
        get:
            operationId: getAuthMe
            summary: Dados do usuário autenticado
            tags: [Auth]
            security:
                - BearerAuth: []
            responses:
                '200':
                    description: Retorna dados do usuário atual e, quando vinculado, o perfil de aluno (`aluno`).
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: integer
                                        format: int64
                                    username:
                                        type: string
                                    email:
                                        type: string
                                    nome_completo:
                                        type: string
                                    is_admin:
                                        type: boolean
                                    ativo:
                                        type: boolean
                                    aprovado:
                                        type: boolean
                                    aluno:
                                        nullable: true
                                        oneOf:
                                            - type: 'null'
                                            - type: object
                                              properties:
                                                  id:
                                                      type: integer
                                                      format: int64
                                                  nome:
                                                      type: string
                                                  idade:
                                                      type: integer
                                                  sexo:
                                                      type: string
                                                  email:
                                                      type: string
                                                  ativo:
                                                      type: boolean
            description: Dados do usuário autenticado (`GET /api/v1/auth/me`).
    /api/v1/auth/alterar-senha:
        post:
            operationId: postAuthAlterarSenha
            summary: Alteração de senha do usuário logado
            tags: [Auth]
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [senha_atual, nova_senha]
                            properties:
                                senha_atual:
                                    type: string
                                    example: senha-segura
                                nova_senha:
                                    type: string
                                    example: senha-segura
                        example:
                            senha_atual: senha-segura
                            nova_senha: senha-segura
                description: Corpo da requisição para `POST /api/v1/auth/alterar-senha`.
            responses:
                '200':
                    description: Senha alterada com sucesso
            description: Alteração de senha do usuário logado (`POST /api/v1/auth/alterar-senha`).
    /api/v1/planos:
        get:
            operationId: getPlanos
            summary: Listagem de planos ativos (público)
            tags: [Planos]
            responses:
                '200':
                    description: Lista de planos ativos
            description: Listagem de planos ativos (público) (`GET /api/v1/planos`).
    /api/v1/pre-cadastro:
        post:
            operationId: postPreCadastro
            summary: Submissão de pré-cadastro (público)
            tags: [Pré-Cadastro]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [nome, email, telefone, data_nascimento, genero, plano_id]
                            properties:
                                nome:
                                    type: string
                                    example: Maria Silva
                                email:
                                    type: string
                                    example: aluno@example.com
                                telefone:
                                    type: string
                                    example: exemplo
                                data_nascimento:
                                    type: string
                                    format: date
                                    example: exemplo
                                genero:
                                    type: string
                                    example: exemplo
                                plano_id:
                                    type: integer
                                    example: 1
                        example:
                            nome: Maria Silva
                            email: aluno@example.com
                            telefone: exemplo
                            data_nascimento: exemplo
                            genero: exemplo
                            plano_id: 1
                description: Corpo da requisição para `POST /api/v1/pre-cadastro`.
            responses:
                '201':
                    description: Pré-cadastro criado com sucesso
            description: Submissão de pré-cadastro (público) (`POST /api/v1/pre-cadastro`).
    /api/v1/anamnese/submit/{token}:
        get:
            operationId: getAnamneseSubmitByToken
            summary: Retorna os metadados públicos do formulário de anamnese via token
            tags: [Anamnese]
            parameters:
                - name: token
                  in: path
                  required: true
                  schema:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  description: Token público de acesso ao formulário de anamnese. Usado em `/api/v1/anamnese/submit/{token}`.
            responses:
                '200':
                    description: Detalhes da anamnese associada
            description: Retorna os metadados públicos do formulário de anamnese via token (`GET /api/v1/anamnese/submit/{token}`).
        post:
            operationId: postAnamneseSubmitByToken
            summary: Submissão pública das respostas do formulário de anamnese
            tags: [Anamnese]
            parameters:
                - name: token
                  in: path
                  required: true
                  schema:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  description: Token público de acesso ao formulário de anamnese. Usado em `/api/v1/anamnese/submit/{token}`.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [respostas]
                            properties:
                                respostas:
                                    type: object
                                    example: {}
                        example:
                            respostas:
                                objetivo: hipertrofia
                description: Corpo da requisição para `POST /api/v1/anamnese/submit/{token}`.
            responses:
                '200':
                    description: Anamnese submetida com sucesso
            description: Submissão pública das respostas do formulário de anamnese (`POST /api/v1/anamnese/submit/{token}`).
    /api/v1/ficha/{hash}/json:
        get:
            operationId: getFichaByHashJson
            summary: Retorna o snapshot JSON completo de uma Ficha Web ativa (público)
            tags: [Fichas Web]
            parameters:
                - name: hash
                  in: path
                  required: true
                  schema:
                    type: string
                    example: a1b2c3d4e5f6
                  description: Hash público do link da ficha ou plano de corrida. Usado em `/api/v1/ficha/{hash}/json`.
            responses:
                '200':
                    description: Snapshot JSON da ficha
            description: Retorna o snapshot JSON completo de uma Ficha Web ativa (público) (`GET /api/v1/ficha/{hash}/json`).
    /api/v1/ficha/{hash}/treino/{letra}:
        get:
            operationId: getFichaByHashTreinoByLetra
            summary: Retorna um bloco específico de treino de musculação por letra (A, B, C, D) (público)
            tags: [Fichas Web]
            parameters:
                - name: hash
                  in: path
                  required: true
                  schema:
                    type: string
                    example: a1b2c3d4e5f6
                  description: Hash público do link da ficha ou plano de corrida. Usado em `/api/v1/ficha/{hash}/treino/{letra}`.
                - name: letra
                  in: path
                  required: true
                  schema:
                    type: string
                    example: A
                  description: Letra do bloco de treino (A, B, C ou D). Usado em `/api/v1/ficha/{hash}/treino/{letra}`.
            responses:
                '200':
                    description: Bloco de treino retornado com sucesso
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    letra:
                                        type: string
                                        example: A
                                    treino:
                                        type: object
                                        example: {}
                                example: {}
                            example:
                                letra: A
            description: Retorna um bloco específico de treino de musculação por letra (A, B, C, D) (público) (`GET /api/v1/ficha/{hash}/treino/{letra}`).
    /api/v1/feedback/{hash}:
        get:
            operationId: getFeedbackByHash
            summary: Verifica se há feedback preenchido para o link ativo (público)
            tags: [Feedback]
            parameters:
                - name: hash
                  in: path
                  required: true
                  schema:
                    type: string
                    example: a1b2c3d4e5f6
                  description: Hash público do link da ficha ou plano de corrida. Usado em `/api/v1/feedback/{hash}`.
            responses:
                '200':
                    description: Status do feedback
            description: Verifica se há feedback preenchido para o link ativo (público) (`GET /api/v1/feedback/{hash}`).
        post:
            operationId: postFeedbackByHash
            summary: Envia feedback qualitativo de treino (público)
            tags: [Feedback]
            parameters:
                - name: hash
                  in: path
                  required: true
                  schema:
                    type: string
                    example: a1b2c3d4e5f6
                  description: Hash público do link da ficha ou plano de corrida. Usado em `/api/v1/feedback/{hash}`.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [feedback]
                            properties:
                                feedback:
                                    type: string
                                    example: Treino concluído sem dor.
                        example:
                            feedback: Treino concluído sem dor.
                description: Corpo da requisição para `POST /api/v1/feedback/{hash}`.
            responses:
                '200':
                    description: Feedback registrado
            description: Envia feedback qualitativo de treino (público) (`POST /api/v1/feedback/{hash}`).
    /api/v1/treinos/mes:
        get:
            operationId: getTreinosMes
            summary: Retorna o calendário mensal de treinos concluídos via link público da Ficha (público)
            tags: [Fichas Web]
            parameters:
                - name: hash_ficha
                  in: query
                  required: true
                  schema:
                    type: string
                    example: a1b2c3d4e5f6
                  description: Hash público da ficha web de musculação. Usado em `/api/v1/treinos/mes`.
                - name: mes
                  in: query
                  schema:
                    type: integer
                    example: 7
                  description: Mês calendário (1–12). Usado em `/api/v1/treinos/mes`.
                - name: ano
                  in: query
                  schema:
                    type: integer
                    example: 2026
                  description: Ano calendário (YYYY). Usado em `/api/v1/treinos/mes`.
            responses:
                '200':
                    description: Frequência mensal do aluno retornada com sucesso
            description: Retorna o calendário mensal de treinos concluídos via link público da Ficha (público) (`GET /api/v1/treinos/mes`).
    /api/v1/treinos/marcar:
        post:
            operationId: postTreinosMarcar
            summary: Marca a conclusão de um treino do dia (musculação)
            description: |
                Marca a conclusão de um treino do dia (musculação) (`POST /api/v1/treinos/marcar`).
                Autenticação é opcional no router (`OptionalAuthMiddleware`): Bearer enriquece o contexto quando presente; o fluxo público do aluno continua válido sem token.
            tags: [Treinos Musculação]
            security:
                - BearerAuth: []
                - {}
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [aluno_id, data_treino, treino_letra]
                            properties:
                                aluno_id:
                                    type: integer
                                    example: 1
                                data_treino:
                                    type: string
                                    format: date
                                    example: "2026-07-17"
                                treino_letra:
                                    type: string
                                    example: A
                                hash_ficha:
                                    type: string
                                    example: a1b2c3d4e5f6
                        example:
                            aluno_id: 1
                            data_treino: "2026-07-17"
                            treino_letra: A
                            hash_ficha: a1b2c3d4e5f6
                description: Corpo da requisição para `POST /api/v1/treinos/marcar`.
            responses:
                '200':
                    description: Treino marcado com sucesso
    /api/v1/treinos/desmarcar:
        post:
            operationId: postTreinosDesmarcar
            summary: Desmarca a conclusão de um treino (musculação)
            description: |
                Desmarca a conclusão de um treino (musculação) (`POST /api/v1/treinos/desmarcar`).
                Autenticação é opcional no router (`OptionalAuthMiddleware`): Bearer enriquece o contexto quando presente; o fluxo público do aluno continua válido sem token.
            tags: [Treinos Musculação]
            security:
                - BearerAuth: []
                - {}
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [aluno_id, data_treino]
                            properties:
                                aluno_id:
                                    type: integer
                                    example: 1
                                data_treino:
                                    type: string
                                    format: date
                                    example: "2026-07-17"
                                hash_ficha:
                                    type: string
                                    example: a1b2c3d4e5f6
                        example:
                            aluno_id: 1
                            data_treino: "2026-07-17"
                            hash_ficha: a1b2c3d4e5f6
                description: Corpo da requisição para `POST /api/v1/treinos/desmarcar`.
            responses:
                '200':
                    description: Treino desmarcado
    /api/v1/corrida/publica/{hash}:
        get:
            operationId: getCorridaPublicaByHash
            summary: Retorna o plano de periodização de corrida ativo público (público)
            tags: [Periodização Corrida]
            parameters:
                - name: hash
                  in: path
                  required: true
                  schema:
                    type: string
                    example: a1b2c3d4e5f6
                  description: Hash público do link da ficha ou plano de corrida. Usado em `/api/v1/corrida/publica/{hash}`.
            responses:
                '200':
                    description: Plano de corrida público
            description: Retorna o plano de periodização de corrida ativo público (público) (`GET /api/v1/corrida/publica/{hash}`).
    /api/v1/corrida/publica/{hash}/concluir:
        post:
            operationId: postCorridaPublicaByHashConcluir
            summary: Marca treino de corrida específico como concluído (público)
            tags: [Periodização Corrida]
            parameters:
                - name: hash
                  in: path
                  required: true
                  schema:
                    type: string
                    example: a1b2c3d4e5f6
                  description: Hash público do link da ficha ou plano de corrida. Usado em `/api/v1/corrida/publica/{hash}/concluir`.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [semana_idx, dia_idx]
                            properties:
                                semana_idx:
                                    type: integer
                                    example: 1
                                dia_idx:
                                    type: integer
                                    example: 1
                        example:
                            semana_idx: 1
                            dia_idx: 1
                description: Corpo da requisição para `POST /api/v1/corrida/publica/{hash}/concluir`.
            responses:
                '200':
                    description: Conclusão registrada
            description: Marca treino de corrida específico como concluído (público) (`POST /api/v1/corrida/publica/{hash}/concluir`).
    /api/v1/alunos/search:
        get:
            operationId: getAlunosSearch
            summary: Busca rápida de alunos por nome ou e-mail (autocomplete)
            tags: [Alunos]
            security:
                - BearerAuth: []
            parameters:
                - name: q
                  in: query
                  required: true
                  schema:
                    type: string
                    example: lombalgia
                  description: Termo de busca textual. Usado em `/api/v1/alunos/search`.
            responses:
                '200':
                    description: Alunos encontrados
            description: Busca rápida de alunos por nome ou e-mail (autocomplete) (`GET /api/v1/alunos/search`).
    /api/v1/alunos:
        get:
            operationId: getAlunos
            summary: Listagem de alunos gerenciados
            tags: [Alunos]
            security:
                - BearerAuth: []
            responses:
                '200':
                    description: Lista de alunos
            description: Listagem de alunos gerenciados (`GET /api/v1/alunos`).
        post:
            operationId: postAlunos
            summary: Cadastro manual de aluno
            tags: [Alunos]
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [nome, idade, sexo, email, telefone]
                            properties:
                                nome:
                                    type: string
                                    example: Maria Silva
                                idade:
                                    type: integer
                                    example: 1
                                sexo:
                                    type: string
                                    example: exemplo
                                email:
                                    type: string
                                    example: aluno@example.com
                                telefone:
                                    type: string
                                    example: exemplo
                                objetivo:
                                    type: string
                                    example: exemplo
                        example:
                            nome: Maria Silva
                            idade: 1
                            sexo: exemplo
                            email: aluno@example.com
                            telefone: exemplo
                            objetivo: exemplo
                description: Corpo da requisição para `POST /api/v1/alunos`.
            responses:
                '201':
                    description: Aluno cadastrado com sucesso
            description: Cadastro manual de aluno (`POST /api/v1/alunos`).
    /api/v1/alunos/{id}:
        get:
            operationId: getAlunosById
            summary: Retorna dados do aluno por ID
            tags: [Alunos]
            security:
                - BearerAuth: []
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: integer
                    example: 1
                  description: Identificador do recurso no caminho. Usado em `/api/v1/alunos/{id}`.
            responses:
                '200':
                    description: Dados do aluno
            description: Retorna dados do aluno por ID (`GET /api/v1/alunos/{id}`).
        put:
            operationId: putAlunosById
            summary: Atualiza dados do aluno por ID
            tags: [Alunos]
            security:
                - BearerAuth: []
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: integer
                    example: 1
                  description: Identificador do recurso no caminho. Usado em `/api/v1/alunos/{id}`.
