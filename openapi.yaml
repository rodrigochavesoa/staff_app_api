components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: 'JWT obtido em POST /api/v1/auth/login. Enviar header Authorization: Bearer <token>.'
    schemas:
        AIMetadata:
            type: object
            description: Auditoria da cadeia de geração/enriquecimento de treino por IA ou fallback local.
            properties:
                ai_used:
                    type: boolean
                    description: Indica se um provedor externo de IA foi aceito após validações.
                    example: false
                provider:
                    type: string
                    description: Provedor efetivamente usado ou local quando o fallback determinístico foi aplicado.
                    enum: [gemini, openai, claude, local]
                    example: local
                model:
                    type: string
                    description: Modelo do provedor, `local-deterministic` (fichas) ou `local-blocks-enricher` (blocos assistivos).
                    example: local-blocks-enricher
                fallback_used:
                    type: boolean
                    description: Indica se houve fallback após falha/rejeição de provedor anterior ou modo `off`.
                    example: false
                fallback_reason:
                    type: string
                    description: Motivo resumido do fallback, quando aplicável (ex. `ai_training_mode_off`).
                    example: ai_training_mode_off
                safety_validated:
                    type: boolean
                    description: Indica se a saída passou pelo safety gate determinístico.
                    example: true
                quality_validated:
                    type: boolean
                    description: Indica se a saída passou pelas validações de qualidade técnica.
                    example: true
                context_used:
                    type: boolean
                    description: Indica se contexto estruturado do aluno foi carregado para a pipeline.
                    example: false
                evidence_count:
                    type: integer
                    description: Quantidade de evidências técnicas enviadas ao provedor.
                    example: 0
                complexity:
                    type: string
                    description: Classificação simples da complexidade do caso.
                    enum: [simples, moderado, complexo]
                    example: simples
                warnings:
                    type: array
                    items:
                        type: string
                    example:
                        - intensidades I/R reduzidas por risco cardiorrespiratório alto
            example:
                ai_used: false
                provider: local
                model: local-blocks-enricher
                fallback_used: false
                fallback_reason: ""
                safety_validated: true
                quality_validated: true
                context_used: false
                evidence_count: 0
                complexity: simples
                warnings: []
