    /api/v1/corrida/gerar:
        post:
            operationId: postCorridaGerar
            summary: Gera plano de periodização de corrida (template flat ou blocos dinâmicos)
            tags: [Periodização Corrida]
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [aluno_id, distancia_prova, data_prova, nivel, pace_base, volume_semanal, dias_semana]
                            properties:
                                aluno_id:
                                    type: integer
                                    example: 1
                                distancia_prova:
                                    type: string
                                    enum: [5K, 10K, 21K, 42K]
                                    example: 5K
                                data_prova:
                                    type: string
                                    format: date
                                    example: "2026-09-01"
                                data_inicio:
                                    type: string
                                    format: date
                                    example: "2026-09-01"
                                nivel:
                                    type: string
                                    enum: [iniciante, intermediario, avancado, elite]
                                    example: iniciante
                                pace_base:
                                    type: string
                                    description: Pace base no formato MM:SS
                                    example: 05:30
                                volume_semanal:
                                    type: number
                                    example: 1.0
                                dias_semana:
                                    type: array
                                    items:
                                        type: integer
                                        minimum: 1
                                        maximum: 7
                                    minItems: 2
                                    maxItems: 7
                                    example:
                                        - 1
                                        - 3
                                usar_blocos:
                                    type: boolean
                                    description: Quando true, gera plano com treinos[].blocos
                                    example: true
                                modo_geracao:
                                    type: string
                                    description: template | blocos_completa | semana_a_semana (alias de entrada todas -> blocos_completa)
                                    example: todas
                        example:
                            aluno_id: 1
                            distancia_prova: 21K
                            data_prova: "2026-09-01"
                            data_inicio: "2026-07-01"
                            nivel: intermediario
                            pace_base: "05:30"
                            volume_semanal: 30.0
                            usar_blocos: true
                            dias_semana:
                                - 1
                                - 3
                                - 5
                            modo_geracao: todas
                description: Corpo da requisição para `POST /api/v1/corrida/gerar`.
            responses:
                '201':
                    description: Periodização de corrida gerada
            description: Gera plano de periodização de corrida (template flat ou blocos dinâmicos) (`POST /api/v1/corrida/gerar`).
    /api/v1/corrida/gerar-blocos:
        post:
            operationId: postCorridaGerarBlocos
            summary: Preview de blocos de corrida (templates + enriquecedor local assistivo)
            description: |
                Gera preview por templates Daniels e aplica o safety gate de corrida
                (downgrade de intensidades `I`/`R` sob risco cardiorrespiratório alto via anamnese
                ou texto em `limitacoes`).

                Modos `AI_TRAINING_MODE`:
                - `off`: templates locais com `ai_metadata.fallback_used=true` e
                  `fallback_reason=ai_training_mode_off`.
                - `assistive` (padrão): usa `LocalBlocksAIProvider` (enriquecedor determinístico,
                  sem chave real). Em sucesso típico: `provider=local`,
                  `model=local-blocks-enricher`, `ai_used=false`, `fallback_used=false`.
                  Em falha/rejeição de safety do enricher: mantém templates com fallback.
                - `required`: exige `BlocksAIProvider` **não-local** aprovado (fake em testes ou
                  provider remoto só em staging autorizado). O enricher local **não** satisfaz
                  `required` → HTTP 503.
            tags: [Periodização Corrida]
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [vdot, distancia_prova, nivel, dias_semana]
                            properties:
                                vdot:
                                    type: number
                                    example: 1.0
                                distancia_prova:
                                    type: string
                                    enum: [5K, 10K, 21K, 42K]
                                    example: 5K
                                nivel:
                                    type: string
                                    enum: [iniciante, intermediario, avancado, elite]
                                    example: iniciante
                                dias_semana:
                                    type: integer
                                    minimum: 2
                                    maximum: 7
                                    example: 3
                                objetivo:
                                    type: string
                                    example: melhorar limiar
                                limitacoes:
                                    type: string
                                    example: nenhuma
                                aluno_id:
                                    type: integer
                                    example: 1
                        example:
                            vdot: 45.0
                            distancia_prova: 21K
                            nivel: intermediario
                            dias_semana: 3
                            objetivo: melhorar limiar
                            limitacoes: nenhuma
                            aluno_id: 1
                description: Corpo da requisição para `POST /api/v1/corrida/gerar-blocos`.
            responses:
                '200':
                    description: Preview de blocos gerado (local ou com provider aprovado)
                '503':
                    description: AI_TRAINING_MODE=required sem provedor de blocos disponível
